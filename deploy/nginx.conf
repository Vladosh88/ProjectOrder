# PhotoOrder — nginx config
# Скопировать в /etc/nginx/sites-available/photoorder, заменить YOUR_DOMAIN.
# sudo ln -s /etc/nginx/sites-available/photoorder /etc/nginx/sites-enabled/
# certbot оформит TLS-блок автоматически: sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    root /var/www/photoorder/client/dist;
    index index.html;

    client_max_body_size 25M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;

    # Хешированные ассеты Vite — кешируем агрессивно
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → Node на 127.0.0.1:3001
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # SPA fallback — отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Закрытые служебные пути
    location ~ /\.(?!well-known) {
        deny all;
    }

    access_log /var/log/nginx/photoorder.access.log;
    error_log  /var/log/nginx/photoorder.error.log;
}
